# Configuración de despliegue en Netlify — Día del Cliente 2026 (Empaques Belén)

[build]
  # Vite genera el sitio estático en la carpeta dist/
  command = "npm run build"
  publish = "dist"

[build.environment]
  # Fija la versión de Node para que el build sea reproducible.
  NODE_VERSION = "20"

# ------------------------------------------------------------------
# Reescritura de una sola página (SPA). SIN esto, recargar /admin,
# /admin/scanner, etc. daría un 404: Netlify buscaría un archivo físico
# en esa ruta. Con esto, toda ruta que no sea un archivo real se sirve
# desde index.html y React Router se encarga de la navegación.
# ------------------------------------------------------------------
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Cacheo agresivo de los assets con hash en el nombre (JS/CSS): son
# inmutables porque Vite cambia el hash en cada build.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
